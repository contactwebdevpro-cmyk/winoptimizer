<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinOptimizer</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        background: radial-gradient(circle at center, #0a1a2f, #02060d);
        color: white;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        text-align: center;
        max-width: 900px;
        padding: 20px;
    }

    .logo {
        width: 60px;
        margin: 0 auto 30px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 5px;
    }

    .logo div {
        width: 25px;
        height: 25px;
        background: linear-gradient(135deg, #3aa0ff, #0066ff);
        border-radius: 2px;
    }

    h1 {
        font-size: 48px;
        font-weight: 600;
        margin-bottom: 20px;
    }

    .highlight {
        color: #3aa0ff;
    }

    p {
        color: #a0a8b8;
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 40px;
    }

    .terminal {
        background: #050b16;
        border: 1px solid #1e2a44;
        border-radius: 12px;
        padding: 20px;
        display: inline-block;
        text-align: left;
        box-shadow: 0 0 20px rgba(0, 100, 255, 0.2);
    }

    .dots {
        display: flex;
        gap: 8px;
        margin-bottom: 15px;
    }

    .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
    }

    .red { background: #ff5f56; }
    .yellow { background: #ffbd2e; }
    .green { background: #27c93f; }

    code {
        font-size: 16px;
        color: #8be9fd;
    }

    .ps {
        color: #50fa7b;
    }

    .url {
        color: #3aa0ff;
    }
</style>
</head>
<body>

<div class="container">
    <div class="logo">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <h1>
        Votre PC Windows,<br>
        enfin <span class="highlight">libéré.</span>
    </h1>

    <p>
        Une seule commande PowerShell. Supprime les bloatwares,<br>
        coupe la télémétrie, accélère le démarrage et renforce la sécurité —<br>
        sans rien installer.
    </p>

    <div class="terminal">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <code>
            <span class="ps">PS&gt;</span> irm 
            <span class="url">winoptimizer-powershell.vercel.app/install.ps1</span> | iex
        </code>
    </div>
</div>

</body>
</html>
