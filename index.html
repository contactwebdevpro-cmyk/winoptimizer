<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinOptimizer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Inter", sans-serif;
    color: white;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

    background:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        radial-gradient(circle at center, #0b1c34 0%, #02060d 70%);
    background-size: 40px 40px, 40px 40px, cover;
}

body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,120,255,0.25), transparent 70%);
    filter: blur(80px);
    z-index: 0;
}

.container {
    text-align: center;
    max-width: 880px;
    z-index: 1;
}

/* LOGO */
.logo {
    display: grid;
    grid-template-columns: repeat(2, 26px);
    gap: 8px;
    justify-content: center;
    margin-bottom: 40px;
}

.logo div {
    width: 26px;
    height: 26px;
    background: linear-gradient(145deg, #3aa0ff, #0066ff);
    box-shadow: 0 0 15px rgba(0,120,255,0.6);
}

/* TITRE */
h1 {
    font-size: 64px;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 24px;
}

.highlight {
    color: #3aa0ff;
}

/* TEXTE */
p {
    font-size: 20px;
    color: #9aa4b2;
    line-height: 1.6;
    margin-bottom: 60px;
}

/* TERMINAL */
.terminal {
    width: 760px;
    margin: auto;
    background: rgba(5,10,20,0.85);
    border: 1px solid rgba(100,140,255,0.2);
    border-radius: 14px;
    padding: 20px 24px 26px;
    box-shadow: 
        0 0 40px rgba(0,120,255,0.15),
        inset 0 0 20px rgba(0,120,255,0.05);
}

/* HEADER TERMINAL */
.terminal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
}

/* DOTS */
.dots {
    display: flex;
    gap: 10px;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.red { background: #ff5f56; }
.yellow { background: #ffbd2e; }
.green { background: #27c93f; }

/* COPY BUTTON */
.copy-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #cfd6e6;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
}

.copy-btn:hover {
    background: rgba(255,255,255,0.1);
}

.copy-btn.copied {
    color: #4dfc7c;
    border-color: #4dfc7c;
}

/* CODE */
code {
    font-size: 18px;
    font-family: "JetBrains Mono", monospace;
}

.ps {
    color: #4dfc7c;
}

.url {
    color: #3aa0ff;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <h1>
        Votre PC Windows,<br>
        enfin <span class="highlight">libéré.</span>
    </h1>

    <p>
        Une seule commande PowerShell. Supprime les bloatwares,<br>
        coupe la télémétrie, accélère le démarrage et renforce la sécurité —<br>
        sans rien installer.
    </p>

<div class="terminal">

    <div class="terminal-header">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>

        <button class="copy-btn" onclick="copyCommand(this)">
            Copier
        </button>
    </div>

    <div class="code-line">
        <span class="ps">PS&gt;</span>
        <span>irm</span>
        <span class="url">winoptimizer-powershell.vercel.app/install.ps1</span>
        <span>| iex</span>
    </div>

</div>

<script>
function copyCommand(btn) {
    const text = "irm winoptimizer-powershell.vercel.app/install.ps1 | iex";

    navigator.clipboard.writeText(text);

    btn.textContent = "Copié !";
    btn.classList.add("copied");

    setTimeout(() => {
        btn.textContent = "Copier";
        btn.classList.remove("copied");
    }, 2000);
}
</script>

</body>
</html>
